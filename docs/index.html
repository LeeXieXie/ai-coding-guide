<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI 编码工具新手安装使用指南</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'AI 编码工具指南',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      search: 'auto',
      auto2top: true,
      homepage: '01-intro.md',

      // 章节顺序
      chapters: [
        '00-official-links.md',
        '01-intro.md',
        '01-scoop.md',
        '03-claude-code.md',
        '04-codex.md',
        '05-gemini-cli.md',
        '02-trellis-workflow.md',
        '06-cc-switch.md',
        '07-mcp.md',
        '08-mcp-skills.md',
        '09-axonhub.md',
        '10-cliproxyapi.md',
        '11-ccload.md',
        '12-cpa-ccswitch.md',
        '13-zotero-ai-butler.md'
      ],

      plugins: [
        function (hook, vm) {
          function getIdx() {
            var path = (vm.route.path || '').replace(/^\//, '');
            var chapters = vm.config.chapters;
            if (!path || path === '') path = vm.config.homepage || '01-intro.md';
            var idx = chapters.indexOf(path);
            if (idx < 0 && path) idx = chapters.indexOf(path + '.md');
            return idx;
          }

          function getNextLink(idx) {
            var c = vm.config.chapters;
            return (idx >= 0 && idx < c.length - 1) ? '#/' + c[idx + 1] : null;
          }

          function getPrevLink(idx) {
            var c = vm.config.chapters;
            return (idx > 0) ? '#/' + c[idx - 1] : null;
          }

          hook.doneEach(function () {
            var hint = document.getElementById('auto-next-hint');
            if (hint) hint.remove();

            var scrollHandler = function () {
              var hint2 = document.getElementById('auto-next-hint');
              var atBottom = (document.documentElement.scrollHeight - window.innerHeight - window.scrollY) < 60;
              var idx = getIdx();
              var prev = getPrevLink(idx);
              var next = getNextLink(idx);

              if (atBottom && (prev || next) && !hint2) {
                var h = document.createElement('div');
                h.id = 'auto-next-hint';
                h.style.cssText = 'position:fixed;bottom:20px;right:20px;display:flex;gap:10px;z-index:999';
                var html = '';
                if (prev) html += '<a href="' + prev + '" style="display:inline-block;background:#3eaf7c;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;text-decoration:none;box-shadow:0 2px 12px rgba(0,0,0,.15)">← 上一页</a>';
                if (next) html += '<a href="' + next + '" style="display:inline-block;background:#3eaf7c;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;text-decoration:none;box-shadow:0 2px 12px rgba(0,0,0,.15)">下一页 →</a>';
                h.innerHTML = html;
                document.body.appendChild(h);
              } else if (!atBottom && hint2) {
                hint2.remove();
              }
            };

            window.removeEventListener('scroll', scrollHandler);
            window.addEventListener('scroll', scrollHandler);
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
