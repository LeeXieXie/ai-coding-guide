<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI 编码工具新手安装使用指南</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* 上下页导航 */
    .page-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid #eaecef;
    }
    .page-nav a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #3eaf7c;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      padding: 8px 16px;
      border: 1px solid #3eaf7c;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .page-nav a:hover {
      background: #3eaf7c;
      color: #fff;
    }
    .page-nav a.disabled {
      color: #ccc;
      border-color: #ccc;
      pointer-events: none;
    }
    .page-nav .prev::before { content: '← '; }
    .page-nav .next::after  { content: ' →'; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'AI 编码工具指南',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      search: 'auto',
      auto2top: true,
      homepage: '01-intro.md',

      // 章节顺序
      chapters: [
        '00-official-links.md',
        '01-intro.md',
        '01-scoop.md',
        '03-claude-code.md',
        '04-codex.md',
        '05-gemini-cli.md',
        '02-trellis-workflow.md',
        '06-cc-switch.md',
        '07-mcp.md',
        '08-mcp-skills.md',
        '09-axonhub.md',
        '10-cliproxyapi.md',
        '11-ccload.md',
        '12-cpa-ccswitch.md',
        '13-zotero-ai-butler.md'
      ],

      plugins: [
        function (hook, vm) {
          // 根据 route path 找到章节索引
          function getIdx() {
            var path = (vm.route.path || '').replace(/^\//, '');
            var chapters = vm.config.chapters;
            // 首页映射
            if (!path || path === '') path = vm.config.homepage || '01-intro.md';
            var idx = chapters.indexOf(path);
            // 如果 URL 已经是 #/xx-file 的格式但 chapters 里没有，尝试直接匹配
            if (idx < 0 && path) idx = chapters.indexOf(path + '.md');
            return idx;
          }

          function getNextLink(idx) {
            var chapters = vm.config.chapters;
            if (idx >= 0 && idx < chapters.length - 1) {
              return '#/' + chapters[idx + 1];
            }
            return null;
          }

          function getPrevLink(idx) {
            var chapters = vm.config.chapters;
            if (idx > 0) {
              return '#/' + chapters[idx - 1];
            }
            return null;
          }

          // 渲染上一页/下一页按钮
          hook.doneEach(function () {
            var idx = getIdx();
            var prevEl = document.querySelector('.page-nav');
            if (prevEl) prevEl.remove();

            var content = document.querySelector('article');
            if (!content) return;

            var nav = document.createElement('div');
            nav.className = 'page-nav';

            var prevLink = getPrevLink(idx);
            if (prevLink) {
              var prev = document.createElement('a');
              prev.className = 'prev';
              prev.href = prevLink;
              prev.textContent = '上一页';
              nav.appendChild(prev);
            } else {
              nav.appendChild(document.createElement('span'));
            }

            var nextLink = getNextLink(idx);
            if (nextLink) {
              var next = document.createElement('a');
              next.className = 'next';
              next.href = nextLink;
              next.textContent = '下一页';
              nav.appendChild(next);
            }

            content.appendChild(nav);
          });

          // 滚动到底部自动弹出提示
          hook.doneEach(function () {
            var hint = document.getElementById('auto-next-hint');
            if (hint) hint.remove();
          });

          hook.mounted(function () {
            window.addEventListener('scroll', function () {
              var hint = document.getElementById('auto-next-hint');
              var scrollBottom = window.innerHeight + window.scrollY;
              var docHeight = document.documentElement.scrollHeight;
              var atBottom = docHeight - scrollBottom < 60;

              if (atBottom) {
                var idx = getIdx();
                var nextLink = getNextLink(idx);
                if (nextLink && !hint) {
                  hint = document.createElement('div');
                  hint.id = 'auto-next-hint';
                  hint.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#3eaf7c;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;z-index:999;box-shadow:0 2px 12px rgba(0,0,0,.15)';
                  hint.textContent = '下一页 →';
                  hint.onclick = function () {
                    window.location.href = nextLink;
                    window.scrollTo(0, 0);
                  };
                  document.body.appendChild(hint);
                }
              } else {
                if (hint) hint.remove();
              }
            });
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
