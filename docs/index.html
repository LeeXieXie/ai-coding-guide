<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI 编码工具新手安装使用指南</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* 上下页导航 */
    .page-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid #eaecef;
    }
    .page-nav a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #3eaf7c;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      padding: 8px 16px;
      border: 1px solid #3eaf7c;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .page-nav a:hover {
      background: #3eaf7c;
      color: #fff;
    }
    .page-nav a.disabled {
      color: #ccc;
      border-color: #ccc;
      pointer-events: none;
    }
    .page-nav .prev::before { content: '← '; }
    .page-nav .next::after  { content: ' →'; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'AI 编码工具指南',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      search: 'auto',
      auto2top: true,
      homepage: '01-intro.md',

      // 章节顺序
      chapters: [
        '00-official-links.md',
        '01-intro.md',
        '01-scoop.md',
        '03-claude-code.md',
        '04-codex.md',
        '05-gemini-cli.md',
        '02-trellis-workflow.md',
        '06-cc-switch.md',
        '07-mcp.md',
        '08-mcp-skills.md',
        '09-axonhub.md',
        '10-cliproxyapi.md',
        '11-ccload.md',
        '12-cpa-ccswitch.md',
        '13-zotero-ai-butler.md'
      ],

      plugins: [
        function (hook, vm) {
          function getIdx() {
            var path = (vm.route.path || '').replace(/^\//, '');
            var chapters = vm.config.chapters;
            if (!path || path === '') path = vm.config.homepage || '01-intro.md';
            var idx = chapters.indexOf(path);
            if (idx < 0 && path) idx = chapters.indexOf(path + '.md');
            return idx;
          }

          function getNextLink(idx) {
            var c = vm.config.chapters;
            return (idx >= 0 && idx < c.length - 1) ? '#/' + c[idx + 1] : null;
          }

          function getPrevLink(idx) {
            var c = vm.config.chapters;
            return (idx > 0) ? '#/' + c[idx - 1] : null;
          }

          hook.doneEach(function () {
            var idx = getIdx();
            var el = document.querySelector('.page-nav');
            if (el) el.remove();
            var hint = document.getElementById('auto-next-hint');
            if (hint) hint.remove();

            var article = document.querySelector('article');
            if (!article) return;

            var nav = document.createElement('div');
            nav.className = 'page-nav';

            var pl = getPrevLink(idx);
            nav.innerHTML += pl
              ? '<a class="prev" href="' + pl + '">上一页</a>'
              : '<span></span>';

            var nl = getNextLink(idx);
            if (nl) {
              nav.innerHTML += '<a class="next" href="' + nl + '">下一页</a>';
            }

            article.appendChild(nav);

            // 滚动到底部自动显示下一页按钮
            var scrollHandler = function () {
              var hint2 = document.getElementById('auto-next-hint');
              var atBottom = (document.documentElement.scrollHeight - window.innerHeight - window.scrollY) < 60;
              var idx2 = getIdx();
              var nl2 = getNextLink(idx2);

              if (atBottom && nl2 && !hint2) {
                var h = document.createElement('div');
                h.id = 'auto-next-hint';
                h.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#3eaf7c;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;z-index:999;box-shadow:0 2px 12px rgba(0,0,0,.15);transition:opacity .3s';
                h.textContent = '下一页 →';
                h.onclick = function () { window.location.href = nl2; };
                document.body.appendChild(h);
              } else if ((!atBottom || !nl2) && hint2) {
                hint2.remove();
              }
            };

            window.removeEventListener('scroll', scrollHandler);
            window.addEventListener('scroll', scrollHandler);
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
